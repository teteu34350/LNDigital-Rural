<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LNDigital Rural - Cadastro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    
    <style>
        :root {
            --primary-green: #4a7c59;
            --secondary-green: #6ba777;
            --light-green: #8bc34a;
            --dark-green: #2e5233;
            --sidebar-bg: #4a7c59;
            --header-bg: #6ba777;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--primary-green) 0%, var(--secondary-green) 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px 0;
        }

        .signup-container {
            width: 100%;
            max-width: 500px;
            padding: 20px;
        }

        .signup-card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            overflow: hidden;
        }

        .signup-header {
            background-color: var(--header-bg);
            color: white;
            padding: 40px 30px;
            text-align: center;
        }

        .signup-header i {
            font-size: 3rem;
            margin-bottom: 15px;
            display: block;
        }

        .signup-header h2 {
            font-weight: 700;
            margin-bottom: 5px;
            font-size: 1.8rem;
        }

        .signup-header p {
            font-size: 0.95rem;
            opacity: 0.95;
            margin: 0;
        }

        .signup-body {
            padding: 40px 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .form-row .form-group {
            margin-bottom: 0;
        }

        .form-group label {
            color: var(--primary-green);
            font-weight: 600;
            margin-bottom: 8px;
            display: block;
            font-size: 0.95rem;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 1rem;
            transition: all 0.3s ease;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--primary-green);
            box-shadow: 0 0 0 3px rgba(74, 124, 89, 0.1);
        }

        .form-group input::placeholder {
            color: #999;
        }

        .password-strength {
            margin-top: 8px;
            height: 4px;
            background-color: #e0e0e0;
            border-radius: 2px;
            overflow: hidden;
        }

        .password-strength-bar {
            height: 100%;
            width: 0%;
            transition: all 0.3s ease;
            background-color: #dc3545;
        }

        .password-strength-bar.weak {
            width: 33%;
            background-color: #dc3545;
        }

        .password-strength-bar.medium {
            width: 66%;
            background-color: #ffc107;
        }

        .password-strength-bar.strong {
            width: 100%;
            background-color: #28a745;
        }

        .terms-checkbox {
            display: flex;
            align-items: flex-start;
            margin-bottom: 25px;
            font-size: 0.9rem;
        }

        .terms-checkbox input[type="checkbox"] {
            margin-right: 10px;
            margin-top: 3px;
            cursor: pointer;
            width: auto;
            border: none;
        }

        .terms-checkbox label {
            margin: 0;
            color: #666;
            font-weight: 500;
            cursor: pointer;
        }

        .terms-checkbox a {
            color: var(--primary-green);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        .terms-checkbox a:hover {
            color: var(--dark-green);
        }

        .btn-signup {
            width: 100%;
            padding: 12px;
            background-color: var(--primary-green);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 15px;
        }

        .btn-signup:hover {
            background-color: var(--dark-green);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(74, 124, 89, 0.3);
        }

        .btn-signup:active {
            transform: translateY(0);
        }

        .btn-signup:disabled {
            background-color: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .login-link {
            text-align: center;
            color: #666;
            font-size: 0.95rem;
        }

        .login-link a {
            color: var(--primary-green);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        .login-link a:hover {
            color: var(--dark-green);
        }

        .error-message {
            background-color: #f8d7da;
            color: #721c24;
            padding: 12px 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            display: none;
            border-left: 4px solid #f5c6cb;
        }

        .success-message {
            background-color: #d4edda;
            color: #155724;
            padding: 12px 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            display: none;
            border-left: 4px solid #c3e6cb;
        }

        @media (max-width: 480px) {
            .signup-container {
                padding: 15px;
            }

            .signup-header {
                padding: 30px 20px;
            }

            .signup-header h2 {
                font-size: 1.5rem;
            }

            .signup-body {
                padding: 30px 20px;
            }

            .form-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="signup-container">
        <div class="signup-card">
            <!-- Header -->
            <div class="signup-header">
                <i class="bi bi-leaf"></i>
                <h2>LNDigital Rural</h2>
                <p>Crie sua Conta</p>
            </div>

            <!-- Body -->
            <div class="signup-body">
                <!-- Messages -->
                <div class="error-message" id="errorMessage"></div>
                <div class="success-message" id="successMessage"></div>

                <!-- Signup Form -->
                <form id="signupForm">
                    <!-- Nome Completo -->
                    <div class="form-group">
                        <label for="fullname">Nome Completo</label>
                        <input 
                            type="text" 
                            id="fullname" 
                            name="fullname" 
                            placeholder="Seu nome completo" 
                            required
                        >
                    </div>

                    <!-- Email -->
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input 
                            type="email" 
                            id="email" 
                            name="email" 
                            placeholder="seu@email.com" 
                            required
                        >
                    </div>

                    <!-- Telefone e CPF -->
                    <div class="form-row">
                        <div class="form-group">
                            <label for="phone">Telefone</label>
                            <input 
                                type="tel" 
                                id="phone" 
                                name="phone" 
                                placeholder="(11) 99999-9999"
                            >
                        </div>
                        <div class="form-group">
                            <label for="cpf">CPF</label>
                            <input 
                                type="text" 
                                id="cpf" 
                                name="cpf" 
                                placeholder="000.000.000-00"
                            >
                        </div>
                    </div>

                    <!-- Tipo de Usuário -->
                    <div class="form-group">
                        <label for="usertype">Tipo de Usuário</label>
                        <select id="usertype" name="usertype" required>
                            <option value="">Selecione um tipo</option>
                            <option value="produtor">Produtor Rural</option>
                            <option value="empresa">Empresa Agrícola</option>
                            <option value="consultor">Consultor</option>
                            <option value="outro">Outro</option>
                        </select>
                    </div>

                    <!-- Senha -->
                    <div class="form-group">
                        <label for="password">Senha</label>
                        <input 
                            type="password" 
                            id="password" 
                            name="password" 
                            placeholder="Digite uma senha forte" 
                            required
                        >
                        <div class="password-strength">
                            <div class="password-strength-bar" id="strengthBar"></div>
                        </div>
                    </div>

                    <!-- Confirmar Senha -->
                    <div class="form-group">
                        <label for="confirmpassword">Confirmar Senha</label>
                        <input 
                            type="password" 
                            id="confirmpassword" 
                            name="confirmpassword" 
                            placeholder="Confirme sua senha" 
                            required
                        >
                    </div>

                    <!-- Terms and Conditions -->
                    <div class="terms-checkbox">
                        <input type="checkbox" id="terms" name="terms" required>
                        <label for="terms">
                            Concordo com os <a href="#termos">Termos de Serviço</a> e <a href="#privacidade">Política de Privacidade</a>
                        </label>
                    </div>

                    <!-- Submit Button -->
                    <button type="submit" class="btn-signup">
                        <i class="bi bi-person-plus me-2"></i>
                        Criar Conta
                    </button>
                </form>

                <!-- Login Link -->
                <div class="login-link">
                    Já tem uma conta? <a href="{% url 'login' %}">Faça login aqui</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Password strength indicator
        document.getElementById('password').addEventListener('input', function() {
            const password = this.value;
            const strengthBar = document.getElementById('strengthBar');
            let strength = 0;

            if (password.length >= 8) strength++;
            if (/[a-z]/.test(password) && /[A-Z]/.test(password)) strength++;
            if (/[0-9]/.test(password)) strength++;
            if (/[^a-zA-Z0-9]/.test(password)) strength++;

            strengthBar.className = 'password-strength-bar';
            if (strength === 1) strengthBar.classList.add('weak');
            else if (strength === 2 || strength === 3) strengthBar.classList.add('medium');
            else if (strength === 4) strengthBar.classList.add('strong');
        });

        // Form submission
        document.getElementById('signupForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const fullname = document.getElementById('fullname').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmpassword = document.getElementById('confirmpassword').value;
            const terms = document.getElementById('terms').checked;
            const errorMessage = document.getElementById('errorMessage');
            const successMessage = document.getElementById('successMessage');

            // Hide messages
            errorMessage.style.display = 'none';
            successMessage.style.display = 'none';

            // Validation
            if (!fullname || !email || !password || !confirmpassword) {
                errorMessage.textContent = 'Por favor, preencha todos os campos obrigatórios.';
                errorMessage.style.display = 'block';
                return;
            }

            if (!email.includes('@')) {
                errorMessage.textContent = 'Por favor, insira um email válido.';
                errorMessage.style.display = 'block';
                return;
            }

            if (password.length < 6) {
                errorMessage.textContent = 'A senha deve ter pelo menos 6 caracteres.';
                errorMessage.style.display = 'block';
                return;
            }

            if (password !== confirmpassword) {
                errorMessage.textContent = 'As senhas não coincidem.';
                errorMessage.style.display = 'block';
                return;
            }

            if (!terms) {
                errorMessage.textContent = 'Você deve concordar com os Termos de Serviço.';
                errorMessage.style.display = 'block';
                return;
            }

            // Success message
            successMessage.textContent = 'Cadastro realizado com sucesso! Redirecionando para login...';
            successMessage.style.display = 'block';

            // Simulate redirect after 2 seconds
            setTimeout(() => {
                window.location.href = '';
            }, 2000);
        });
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
